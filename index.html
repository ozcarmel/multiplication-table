<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="לוח כפל אינטראקטיבי בעברית ובאנגלית עם תרגול חזותי לילדים."
    />
    <title>לוח הכפל בקלות | Multiplication Made Easy</title>
  </head>
  <body>
    <main class="app" dir="rtl" lang="he">
      <style>
        *{box-sizing:border-box}
        body{margin:0}
        .app{min-height:100vh;padding:24px;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:#14324a;background:#f6fbff;text-align:right}
        .app[dir="ltr"]{text-align:left}
        .shell{max-width:1180px;margin:0 auto;display:grid;gap:18px}
        .hero{display:flex;align-items:end;justify-content:space-between;gap:16px}
        .hero h1{margin:0;font-size:48px;line-height:1}
        .hero p{margin:10px 0 0;color:#53677a;font-size:18px;line-height:1.55;direction:inherit;text-align:inherit;unicode-bidi:plaintext}
        .panel{background:white;border:1px solid #c9dbe8;border-radius:8px;padding:18px;box-shadow:0 18px 45px rgba(20,50,74,.12);min-width:0}
        .layout{display:grid;grid-template-columns:320px minmax(0,1fr);grid-template-areas:"insight table";gap:18px;align-items:start}
        .table-panel{grid-area:table}
        .insight{grid-area:insight}
        .side-stack{grid-area:insight;display:grid;gap:18px}
        .side-stack .insight{grid-area:auto}
        .app[dir="rtl"] .layout{grid-template-columns:320px minmax(0,1fr);grid-template-areas:"insight table"}
        .app[dir="ltr"] .layout{grid-template-columns:320px minmax(0,1fr);grid-template-areas:"insight table"}
        .table-wrap{direction:ltr;overflow:auto}
        .table{display:grid;grid-template-columns:repeat(11,56px);gap:5px;min-width:670px}
        .cell,.axis,.corner{min-height:48px;border-radius:7px;display:grid;place-items:center;font-weight:800}
        .axis,.corner{background:#14324a;color:white}
        .cell{border:1px solid #d4e2ec;background:white;color:#14324a;cursor:pointer}
        .cell:hover,.cell.active{background:#d9f3f0;border-color:#087f8c}
        .cell.selected{background:#ff6b5a;color:white;border-color:#c94736}
        .cell.mirror{background:#fff3ba;border-color:#d7ae2f}
        .insight{display:grid;gap:12px;align-content:start}
        .equation{direction:ltr;text-align:left;display:flex;flex-wrap:wrap;gap:8px;font-size:34px;font-weight:900}
        .equation span,.equation strong{min-width:46px;min-height:46px;display:grid;place-items:center;border-radius:8px;background:#d9f3f0}
        .equation strong{min-width:54px;background:#f6c945}
        .note{line-height:1.6;color:#53677a;direction:inherit;text-align:inherit}
        .insight-lines{display:grid;gap:8px;color:#53677a}
        .insight-line{display:block;line-height:1.6;direction:inherit;text-align:inherit}
        .app[dir="ltr"] .insight-line{justify-content:flex-start}
        .math{direction:ltr;unicode-bidi:isolate;display:inline-block}
        .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-start}
        .app[dir="rtl"] .actions{justify-content:flex-end}
        .actions button{min-height:44px;border:0;border-radius:8px;background:#14324a;color:white;padding:10px 14px;font-weight:800;cursor:pointer}
        .name-card{display:grid;gap:10px}
        .name-card.saved label,.name-card.saved .name-row{display:none}
        .name-card label{font-weight:800}
        .name-row{display:flex;gap:8px;align-items:center}
        .app[dir="rtl"] .name-row{flex-direction:row-reverse}
        .name-row input{min-height:44px;min-width:0;flex:1;border:1px solid #c9dbe8;border-radius:8px;padding:10px 12px;font:inherit;color:#14324a;text-align:inherit;direction:inherit}
        .name-row button{min-height:44px;border:0;border-radius:8px;background:#087f8c;color:white;padding:10px 14px;font-weight:800;cursor:pointer}
        .greeting{margin:0;color:#087f8c;font-size:20px;font-weight:900;line-height:1.4}
        .greeting:empty{display:none}
        .multiples-panel{display:grid;gap:12px;justify-items:center;text-align:center}
        .multiples-panel h2{margin:0;text-align:center;width:100%}
        .multiples-picker{display:grid;grid-template-columns:repeat(5,50px);gap:8px;direction:ltr;justify-content:center}
        .multiples-picker button{min-height:38px;border:1px solid #c9dbe8;border-radius:8px;background:white;color:#14324a;font-weight:900;cursor:pointer}
        .multiples-picker button.selected{background:#14324a;color:white;border-color:#14324a}
        .times-card{background:#dbe46b;border-radius:8px;padding:14px 18px;color:#111;direction:ltr;text-align:center;width:min(100%,230px)}
        .times-card h3{margin:0 0 6px;font-size:22px;line-height:1.1}
        .times-list{display:grid;gap:2px;font-size:20px;line-height:1.18;white-space:nowrap}
        h2{margin:0 0 12px}
        bdi{unicode-bidi:isolate}
        @media(max-width:850px){
          .app{padding:16px}
          .hero{display:block}
          .hero h1{font-size:38px}
          .actions{margin-top:14px}
          .layout{grid-template-columns:1fr;grid-template-areas:"table" "insight"}
          .table{grid-template-columns:repeat(11,46px);min-width:560px}
          .panel{padding:14px}
        }
        @media print{
          @page{size:A4 portrait;margin:10mm}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
          body{background:white}
          .app{min-height:auto;padding:0;background:white;color:#111;text-align:center}
          .shell{max-width:none;margin:0;display:block}
          .hero{display:block;text-align:center;margin:0 0 8mm}
          .hero h1{font-size:26pt;line-height:1.1;margin:0}
          .hero p{display:none}
          .actions,.name-card,.multiples-panel{display:none!important}
          .layout{display:block}
          .panel{box-shadow:none;border:0;padding:0;background:white}
          .table-panel{break-inside:avoid;page-break-inside:avoid}
          .table-panel h2{font-size:14pt;margin:0 0 5mm;text-align:center}
          .table-wrap{overflow:visible;width:100%;direction:ltr}
          .table{display:grid;grid-template-columns:repeat(11,15.8mm);gap:1.2mm;min-width:0;width:max-content;margin:0 auto}
          .cell,.axis,.corner{min-height:10.8mm;border-radius:2mm;font-size:11pt;font-weight:800}
          .axis,.corner{background:#14324a!important;color:white!important}
          .cell{background:white!important;border:1px solid #9db8ca;color:#111}
          .cell.active{background:#e7f6f4!important;border-color:#9db8ca}
          .cell.mirror{background:#fff6c9!important;border-color:#c3a63b}
          .cell.selected{background:#ff6b5a!important;color:white!important;border-color:#b33f32}
          .insight{margin-top:7mm;border-top:1px solid #c9dbe8;padding-top:5mm;break-inside:avoid;page-break-inside:avoid}
          .insight.panel{border-inline:0;border-bottom:0}
          .equation{justify-content:center;font-size:20pt;gap:2mm;margin-bottom:3mm}
          .equation span,.equation strong{min-width:12mm;min-height:11mm;border-radius:2mm;background:#d9f3f0!important}
          .equation strong{background:#f6c945!important}
          .insight-lines{max-width:170mm;margin:0 auto;gap:2mm;font-size:11pt;color:#333}
          .insight-line{text-align:inherit}
        }
      </style>

      <section class="shell">
        <header class="hero">
          <div>
            <h1 id="title">לוח הכפל בקלות</h1>
            <p id="subtitle">לוח 10x10 אינטראקטיבי בעברית. לחצו על תא כדי לראות תבנית והסבר.</p>
          </div>
          <div class="actions">
            <button type="button" id="printButton">הדפסה</button>
            <button type="button" id="languageButton">English</button>
          </div>
        </header>

          <section class="layout">
            <div class="panel table-panel">
              <h2 id="tableTitle">לוח 10x10 אינטראקטיבי</h2>
            <div class="table-wrap">
              <div class="table" id="table" aria-label="לוח הכפל"></div>
            </div>
            </div>

            <div class="side-stack">
              <aside class="panel insight" aria-live="polite">
                <section class="name-card" aria-labelledby="nameLabel">
                  <p class="greeting" id="greeting"></p>
                  <label id="nameLabel" for="childName">איך קוראים לך?</label>
                  <div class="name-row">
                    <input id="childName" name="childName" autocomplete="given-name" />
                    <button type="button" id="saveNameButton">שמירה</button>
                  </div>
                </section>
                <div class="equation" id="equation"></div>
                <div class="insight-lines" id="insight"></div>
              </aside>

              <section class="panel multiples-panel" aria-labelledby="multiplesTitle">
                <h2 id="multiplesTitle">כפולות</h2>
                <div class="multiples-picker" id="multiplesPicker"></div>
                <article class="times-card">
                  <h3 id="timesTitle"></h3>
                  <div class="times-list" id="timesList"></div>
                </article>
              </section>
            </div>
        </section>
      </section>

      <script>
        (function(){
          var lang = 'he';
          var selectedA = 3;
          var selectedB = 4;
          var selectedMultiple = 1;
          var table = document.getElementById('table');
          var app = document.querySelector('.app');
          var childName = '';
          var greetingTimer = null;
          try {
            childName = localStorage.getItem('multiplication-child-name') || '';
          } catch (error) {
            childName = '';
          }
          var strings = {
            he: {
              dir: 'rtl',
              title: 'לוח הכפל בקלות',
              subtitle: 'לוח 10x10 אינטראקטיבי בעברית. לחצו על תא כדי לראות תבנית והסבר.',
              tableTitle: 'לוח 10x10 אינטראקטיבי',
              print: 'הדפסה',
              language: 'English',
              nameLabel: 'איך קוראים לך?',
              namePlaceholder: 'השם שלך',
              saveName: 'שמירה',
              greeting: 'שלום {name}!',
              noNameGreeting: 'שלום!',
              multiplesTitle: 'כפולות',
              timesTitle: 'כפולות של {n}',
              ariaTable: 'לוח הכפל',
              times: 'כפול',
              equals: 'שווה',
              repeatedPrefix: 'קבוצות שוות:',
              groupsWord: 'קבוצות שוות של',
              mirrorPrefix: 'חוק החילוף:',
              cluePrefix: 'רמז:',
              clues: {
                square: 'זה מספר ריבועי: שני הגורמים שווים.',
                ten: 'כפולות של 10 מוסיפות אפס.',
                five: 'כפולות של 5 מסתיימות ב-0 או 5.',
                nine: 'בכפולות של 9 יש תבנית ספרות יפה.',
                two: 'כפול 2 הוא זוגות.',
                default: 'אפשר להפוך את הגורמים ולקבל אותה תשובה.'
              }
            },
            en: {
              dir: 'ltr',
              title: 'Multiplication Made Easy',
              subtitle: 'An interactive 10x10 multiplication table. Click a cell to see the pattern and explanation.',
              tableTitle: 'Interactive 10x10 Table',
              print: 'Print',
              language: 'עברית',
              nameLabel: 'What is your name?',
              namePlaceholder: 'Your name',
              saveName: 'Save',
              greeting: 'Hello {name}!',
              noNameGreeting: 'Hello!',
              multiplesTitle: 'Multiples',
              timesTitle: '{n} times table',
              ariaTable: 'Multiplication table',
              times: 'times',
              equals: 'equals',
              repeatedPrefix: 'Equal groups:',
              groupsWord: 'groups of',
              mirrorPrefix: 'Commutative fact:',
              cluePrefix: 'Clue:',
              clues: {
                square: 'This is a square number: both factors are equal.',
                ten: 'Multiples of 10 add a zero.',
                five: 'Multiples of 5 end in 0 or 5.',
                nine: 'Multiples of 9 have a useful digit pattern.',
                two: 'Times 2 means pairs.',
                default: 'You can swap the factors and keep the same answer.'
              }
            }
          };

          function escapeHtml(value){
            return String(value).replace(/[&<>"']/g,function(character){
              return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[character];
            });
          }

          function expression(a,b){
            return a + ' × ' + b + ' = ' + (a*b);
          }

          function isolateLtr(value){
            return '\u2066' + value + '\u2069';
          }

          function clue(a,b){
            var c = strings[lang].clues;
            if(a===b)return c.square;
            if(a===10||b===10)return c.ten;
            if(a===5||b===5)return c.five;
            if(a===9||b===9)return c.nine;
            if(a===2||b===2)return c.two;
            return c.default;
          }

          function applyLanguage(){
            var t = strings[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = t.dir;
            app.lang = lang;
            app.dir = t.dir;
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('tableTitle').textContent = t.tableTitle;
            document.getElementById('printButton').textContent = t.print;
            document.getElementById('languageButton').textContent = t.language;
            document.getElementById('nameLabel').textContent = t.nameLabel;
            document.getElementById('childName').placeholder = t.namePlaceholder;
            document.getElementById('saveNameButton').textContent = t.saveName;
            document.getElementById('multiplesTitle').textContent = t.multiplesTitle;
            table.setAttribute('aria-label', t.ariaTable);
            updateGreeting();
            draw();
            updateInsight();
            drawMultiples();
          }

          function displayName(){
            return childName.trim();
          }

          function updateGreeting(){
            var t = strings[lang];
            var name = displayName();
            var nameCard = document.querySelector('.name-card');
            if(!name){
              document.getElementById('greeting').textContent = t.noNameGreeting;
            }
            document.getElementById('childName').value = childName;
            if(name) {
              nameCard.classList.add('saved');
            } else {
              nameCard.classList.remove('saved');
            }
          }

          function showTemporaryGreeting(){
            var t = strings[lang];
            var name = displayName();
            var greeting = document.getElementById('greeting');
            if(greetingTimer) window.clearTimeout(greetingTimer);
            greeting.textContent = name ? t.greeting.replace('{name}', name) : t.noNameGreeting;
            greetingTimer = window.setTimeout(function(){
              greeting.textContent = '';
            }, 2400);
          }

          function saveName(){
            childName = document.getElementById('childName').value.trim().slice(0, 24);
            try {
              localStorage.setItem('multiplication-child-name', childName);
            } catch (error) {}
            updateGreeting();
            showTemporaryGreeting();
            updateInsight();
          }

          function draw(){
            var t = strings[lang];
            table.innerHTML = '';
            var corner = document.createElement('div');
            corner.className = 'corner';
            corner.textContent = '×';
            table.appendChild(corner);

            for(var h=1;h<=10;h++){
              var head = document.createElement('div');
              head.className = 'axis';
              head.textContent = h;
              table.appendChild(head);
            }

            for(var a=1;a<=10;a++){
              var axis = document.createElement('div');
              axis.className = 'axis';
              axis.textContent = a;
              table.appendChild(axis);

              for(var b=1;b<=10;b++){
                var button = document.createElement('button');
                button.type = 'button';
                button.className = 'cell';
                if(a===selectedA&&b===selectedB)button.className += ' selected';
                else if(a===selectedB&&b===selectedA)button.className += ' mirror';
                else if(a===selectedA||b===selectedB)button.className += ' active';
                button.textContent = a*b;
                button.setAttribute('aria-label', a + ' ' + t.times + ' ' + b + ' ' + t.equals + ' ' + (a*b));
                button.onclick = (function(row,col){
                  return function(){
                    selectedA = row;
                    selectedB = col;
                    draw();
                    updateInsight();
                  };
                })(a,b);
                table.appendChild(button);
              }
            }
          }

          function drawMultiples(){
            var t = strings[lang];
            var picker = document.getElementById('multiplesPicker');
            var title = document.getElementById('timesTitle');
            var list = document.getElementById('timesList');
            picker.innerHTML = '';

            for(var factor=1;factor<=10;factor++){
              var button = document.createElement('button');
              button.type = 'button';
              button.textContent = factor;
              button.className = factor === selectedMultiple ? 'selected' : '';
              button.setAttribute('aria-pressed', factor === selectedMultiple ? 'true' : 'false');
              button.onclick = (function(value){
                return function(){
                  selectedMultiple = value;
                  drawMultiples();
                };
              })(factor);
              picker.appendChild(button);
            }

            title.textContent = t.timesTitle.replace('{n}', selectedMultiple);
            list.innerHTML = '';
            for(var multiplier=1;multiplier<=10;multiplier++){
              var line = document.createElement('div');
              line.textContent = selectedMultiple + ' x ' + multiplier + ' = ' + (selectedMultiple * multiplier);
              list.appendChild(line);
            }
          }

          function updateInsight(){
            var product = selectedA * selectedB;
            var t = strings[lang];
            var parts = [];
            for(var i=0;i<selectedB;i++)parts.push(selectedA);
            var mirror = expression(selectedB, selectedA);

            document.getElementById('equation').innerHTML =
              '<span>' + selectedA + '</span><span>×</span><span>' + selectedB + '</span><span>=</span><strong>' + product + '</strong>';

            var insight = document.getElementById('insight');
            var name = displayName();
            var personalIntro = name ? '<span>' + escapeHtml(name) + ',</span>' : '';
            if(lang === 'he'){
              insight.innerHTML =
                '<div class="insight-line">' +
                  '<strong>' + escapeHtml(t.repeatedPrefix) + '</strong> ' +
                  escapeHtml(isolateLtr(selectedB) + ' ' + t.groupsWord + ' ' + isolateLtr(parts.join(' + '))) +
                '</div>' +
                '<div class="insight-line">' +
                  escapeHtml((name ? name + ', ' : '') + 'חוק החילוף מאפשר לנו להפוך את הגורמים ולקבל אותה תשובה: ' + isolateLtr(mirror)) +
                '</div>' +
                '<div class="insight-line">' +
                  '<strong>' + escapeHtml(t.cluePrefix) + '</strong> ' +
                  escapeHtml(clue(selectedA, selectedB)) +
                '</div>';
            } else {
              insight.innerHTML =
                '<div class="insight-line">' +
                  '<strong>' + escapeHtml(t.repeatedPrefix) + '</strong> ' +
                  '<span class="math">' + selectedB + '</span>' +
                  '<span>' + escapeHtml(t.groupsWord) + '</span>' +
                  '<span class="math">' + selectedA + '</span>' +
                  '<span>:</span>' +
                  '<span class="math">' + escapeHtml(parts.join(' + ') + ' = ' + product) + '</span>' +
                '</div>' +
                '<div class="insight-line">' +
                  personalIntro +
                  '<span>The commutative fact lets us swap the factors and keep the same answer:</span>' +
                  '<span class="math">' + escapeHtml(mirror) + '</span>' +
                '</div>' +
                '<div class="insight-line">' +
                  '<strong>' + escapeHtml(t.cluePrefix) + '</strong> ' +
                  '<span>' + escapeHtml(clue(selectedA, selectedB)) + '</span>' +
                '</div>';
            }
          }

          document.getElementById('printButton').onclick = function(){ window.print(); };
          document.getElementById('saveNameButton').onclick = saveName;
          document.getElementById('childName').onkeydown = function(event){
            if(event.key === 'Enter') saveName();
          };
          document.getElementById('languageButton').onclick = function(){
            lang = lang === 'he' ? 'en' : 'he';
            applyLanguage();
          };

          applyLanguage();
        })();
      </script>
    </main>
  </body>
</html>
